server {
    listen 80;
    server_name portal.localhost;

    # Moodle 5.x: web root artık public/ altında
    # Docker volume: moodle/public → /var/www/html
    root /var/www/html;
    index index.php index.html;

    client_max_body_size 64M;
    client_body_timeout 300s;
    fastcgi_read_timeout 300s;

    # Moodle güvenlik başlıkları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Moodle veri dizinine doğrudan erişimi engelle
    location /dataroot/ {
        deny all;
        return 404;
    }

    # .htaccess ve gizli dosyalara erişimi engelle
    location ~ /\. {
        deny all;
        return 404;
    }

    # Statik dosyalar - önbellekle sun
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PHP dosyaları
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Genel erişim
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
