## Hostinger/üretim ortamı için HTTPS + HTTP→HTTPS yönlendirme referansı.
## Yerelde bu dosya kullanılmaz; yalnızca Hostinger yapılandırması için referans.
##
## Hostinger Shared Hosting'de SSL Nginx tarafından otomatik yönetilir.
## Bu dosyayı VPS'e geçildiğinde /etc/nginx/sites-available/ altına kopyalayın.

## HTTP → HTTPS yönlendirme
server {
    listen 80;
    server_name portal.ayisigimakademi.com;
    return 301 https://$host$request_uri;
}

## HTTPS
server {
    listen 443 ssl http2;
    server_name portal.ayisigimakademi.com;

    ssl_certificate     /etc/letsencrypt/live/portal.ayisigimakademi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.ayisigimakademi.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    root /home/KULLANICI/public_html/portal;
    index index.php;

    client_max_body_size 64M;
    fastcgi_read_timeout 300s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /dataroot/ { deny all; return 404; }
    location ~ /\.          { deny all; return 404; }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS on;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
